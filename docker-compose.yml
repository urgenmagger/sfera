services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: ["php-fpm"]
    volumes:
      - ./src:/var/www/html
    networks:
      - sfera-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sfera-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sfera
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sfera-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  sfera-network:
    driver: bridge

volumes:
  db_data:
